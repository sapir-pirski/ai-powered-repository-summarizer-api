<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Summarize endpoint request and response preview</title>
  <desc id="desc">A terminal-style request preview next to the structured JSON response returned by the API.</desc>
  <rect width="1400" height="560" rx="28" fill="#0F172A"/>
  <rect x="64" y="64" width="1272" height="432" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>

  <g font-family="Menlo, Monaco, Consolas, monospace">
    <rect x="104" y="106" width="560" height="348" rx="14" fill="#020617" stroke="#475569" stroke-width="2"/>
    <circle cx="134" cy="134" r="7" fill="#F87171"/>
    <circle cx="160" cy="134" r="7" fill="#FBBF24"/>
    <circle cx="186" cy="134" r="7" fill="#34D399"/>
    <text x="124" y="186" fill="#93C5FD" font-size="19">$ curl -X POST /summarize</text>
    <text x="124" y="226" fill="#CBD5E1" font-size="18">Content-Type: application/json</text>
    <text x="124" y="282" fill="#E2E8F0" font-size="18">{</text>
    <text x="152" y="318" fill="#A7F3D0" font-size="18">"github_url": "https://github.com/psf/requests"</text>
    <text x="124" y="354" fill="#E2E8F0" font-size="18">}</text>

    <rect x="736" y="106" width="560" height="348" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="776" y="166" fill="#0F172A" font-size="22" font-weight="700">200 OK</text>
    <text x="776" y="214" fill="#334155" font-size="18">{</text>
    <text x="804" y="250" fill="#0F766E" font-size="18">"summary": "Concise project explanation...",</text>
    <text x="804" y="286" fill="#1D4ED8" font-size="18">"technologies": ["Python", "urllib3"],</text>
    <text x="804" y="322" fill="#7C2D12" font-size="18">"structure": "Package, tests, docs..."</text>
    <text x="776" y="358" fill="#334155" font-size="18">}</text>
    <rect x="776" y="390" width="242" height="36" rx="8" fill="#DCFCE7"/>
    <text x="798" y="414" fill="#166534" font-size="15">strict response schema</text>
  </g>
</svg>
