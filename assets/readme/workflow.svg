<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Repository summarizer workflow</title>
  <desc id="desc">A pipeline showing GitHub URL input, repository analysis, context budgeting, LLM analysis, and JSON output.</desc>
  <rect width="1400" height="520" rx="28" fill="#F8FAFC"/>
  <rect x="58" y="58" width="1284" height="404" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="94" y="116" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Processing pipeline</text>
  <text x="94" y="150" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">The service keeps the high-signal repository context and drops files that would waste LLM budget.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#64748B"/>
    </marker>
  </defs>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="94" y="226" width="190" height="138" rx="14" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
    <text x="122" y="274" fill="#1E3A8A" font-size="20" font-weight="700">GitHub URL</text>
    <text x="122" y="306" fill="#1E40AF" font-size="15">owner / repo</text>
    <text x="122" y="332" fill="#1E40AF" font-size="15">public repository</text>

    <rect x="354" y="226" width="190" height="138" rx="14" fill="#E0F2FE" stroke="#38BDF8" stroke-width="2"/>
    <text x="386" y="274" fill="#075985" font-size="20" font-weight="700">Fetch tree</text>
    <text x="386" y="306" fill="#0369A1" font-size="15">metadata</text>
    <text x="386" y="332" fill="#0369A1" font-size="15">languages</text>

    <rect x="614" y="226" width="190" height="138" rx="14" fill="#DCFCE7" stroke="#34D399" stroke-width="2"/>
    <text x="646" y="274" fill="#14532D" font-size="20" font-weight="700">Filter</text>
    <text x="646" y="306" fill="#166534" font-size="15">skip binaries</text>
    <text x="646" y="332" fill="#166534" font-size="15">rank key files</text>

    <rect x="874" y="226" width="190" height="138" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="906" y="274" fill="#78350F" font-size="20" font-weight="700">Prompt</text>
    <text x="906" y="306" fill="#92400E" font-size="15">context budget</text>
    <text x="906" y="332" fill="#92400E" font-size="15">strict schema</text>

    <rect x="1134" y="226" width="164" height="138" rx="14" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
    <text x="1162" y="274" fill="#581C87" font-size="20" font-weight="700">JSON</text>
    <text x="1162" y="306" fill="#6B21A8" font-size="15">summary</text>
    <text x="1162" y="332" fill="#6B21A8" font-size="15">tech + structure</text>

    <line x1="296" y1="295" x2="342" y2="295" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="556" y1="295" x2="602" y2="295" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="816" y1="295" x2="862" y2="295" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="1076" y1="295" x2="1122" y2="295" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
</svg>
